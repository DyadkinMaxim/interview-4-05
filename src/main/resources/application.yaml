spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/appdb?currentSchema=interview
    username: appuser
    password: secret
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    schemas: interview
    default-schema: interview

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: interview